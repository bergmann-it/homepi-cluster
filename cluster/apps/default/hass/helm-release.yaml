---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hass
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: home-assistant
      version: 0.3.44
      sourceRef:
        kind: HelmRepository
        name: hass-charts
        namespace: flux-system
  values:
    env:
     - name: TZ
       value: Europe/Berlin
    persistence:
      enabled: true
      storageClass: "local-path"
    additionalPorts:
     - name: hmipcallback
       containerPort: 2010
       protocol: TCP
    additionalServices:
     - name: hmipcallback
       port: 2010
       targetPort: hmipcallback
       type: NodePort
       protocol: TCP
       nodePort: 32010
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
      hosts:
        - host: hass.bergmann.click
          paths:
            - path: /
              pathType: Prefix 
      tls:
        - hosts:
          - hass.bergmann.click
          secretName: hass-cert
