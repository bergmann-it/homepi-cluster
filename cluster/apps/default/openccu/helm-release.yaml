---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openccu
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: openccu
      version: 3.87.6
      sourceRef:
        kind: HelmRepository
        name: openccu-charts
        namespace: flux-system
  values:
    persistence:
      data:
        enabled: true
        size: 256Mi
        accessMode: ReadWriteOnce
        storageClass: "local-path"
